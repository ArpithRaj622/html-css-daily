<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Profile Card</title>
    <!-- <style>
        *{
            border: 1px solid red;
        }
    </style> -->
</head>
<body class="bg-slate-100">
    <section id="profile">
        <div class="profile-card">
            <!-- profile pic -->
            <div class="profile-pic"></div>

            <!-- personal details  -->
            <div class="text-content">
                <p class="font-bold text-blue-900 text-2xl">Ryūō Kenshin</p>
                <p class="font-bold">Full Stack Developer</p>
                <p class="text-xs px-2">
                    Building modern, responsive web applications with MongoDB, Express.js, React, and Node.js.
                </p>
            </div>

            <!-- buttons -->
            <div class="btn-container">
                <button aria-label="follow button" class="w-[70%] bg-blue-700 text-white font-bold rounded-md p-1 btn-effects">
                    Follow
                </button>
                <button aria-label="message button" class="w-[15%] bg-slate-200 text-slate-700 rounded-md p-1 btn-effects">
                    <i class="fa-regular fa-message text-lg"></i>
                </button>
            </div>
        </div>
    </section>    
</body>
</html>
