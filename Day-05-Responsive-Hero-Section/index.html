<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.1.0/css/all.min.css">
    <title>Responsive Hero Section</title>
</head>
<body class="bg-slate-100">
    <!-- navbar -->
    <section class="navbar-container">
        <nav class="nav">
            <!-- logo -->
            <div class="logo">
                &lt; <span class="text-slate-700">Arpith</span>.<span class="text-blue-800">dev</span> /&gt;
            </div>

            <!-- nav links -->
            <div class="hidden lg:block">
                <ul class="flex gap-8 text-2xl">
                    <li>
                        <i class="fa-solid fa-house"></i>
                        Home
                    </li>
                    <li>
                        <i class="fa-regular fa-user"></i>
                        About
                    </li>
                    <li>
                        <i class="fa-regular fa-folder"></i>
                        Projects
                    </li>
                    <li>
                        <i class="fa-solid fa-phone"></i>
                        Contact
                    </li>
                </ul>
            </div>

            <!-- mobile hamburger menu -->
            <div class="lg:hidden">
                <i class="fa-solid fa-bars text-2xl md:text-4xl cursor-pointer"></i>
            </div>
        </nav>
    </section>

    <!-- hero section -->
    <section class="hero-section">
        <div class="hero-context">
            <div class="text-center lg:text-left">
                <p class="text-lg md:text-xl"><span class="text-blue-800">Hi</span>, I am</p>
                <h1 class="text-4xl md:text-5xl">Arpith Raj</h1>
            </div>
            <h2 class="text-3xl text-blue-800 md:text-4xl">Full Stack Developer</h2>
            <p class="text-lg text-center w-full md:w-md md:text-2xl lg:w-full lg:text-left">I build responsive and user-friendly web applications using modern technologies like HTML, CSS, Tailwind CSS, JavaScript, React, Node.js, Express, and MongoDB.</p>

            <!-- buttons -->
            <div class="buttons">
                <button class="btn bg-blue-600 hover:bg-blue-700" aria-label="hire me button">Hire Me</button>
                <button class="btn bg-violet-600 hover:bg-violet-700" aria-label="download resume button">Download Resume</button>
            </div>
        </div>

        <!-- image -->
        <div class="hero-image">
            <div>
                <img src="./images/AR.png" alt="animated image of a developer">
            </div>
            <div class="text-3xl flex gap-4"> 
                <i class="fa-brands fa-linkedin cursor-pointer"></i>
                <i class="fa-brands fa-github cursor-pointer"></i>
                <i class="fa-brands fa-instagram cursor-pointer"></i>
            </div>
        </div>
    </section>
</body>
</html>
